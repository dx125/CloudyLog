name: puff
description: The gut health tracker that doesn't take itself seriously. Every toot counts.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  share_plus: ^10.0.2
  supabase_flutter: ^2.8.0
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  uuid: ^4.5.1
  google_fonts: ^6.2.1

# drift_dev 2.34 breaks against sqlparser 0.44.6 (DartPlaceholder.when was
# removed within the ^0.44 range). Pin until a fixed drift_dev ships.
dependency_overrides:
  sqlparser: 0.44.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  generate: true

# App launcher icon — Gust, the design book's App Store icon (bright mint body on
# ink). Adaptive icon = ink field + Gust foreground; legacy/round from icon.png.
# Regenerate the source PNGs with `flutter test tool/render_brand_assets.dart`,
# then `dart run flutter_launcher_icons`.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/branding/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1E2A38"
  adaptive_icon_foreground: "assets/branding/icon_foreground.png"
  adaptive_icon_monochrome: "assets/branding/icon_monochrome.png"

# Launch splash — Design Book §09, stage one: the native launch image the OS
# shows before Flutter boots. Just the Gust mark on the exact canvas color
# (#F4FAF6 light / #141D28 dark) so there's no seam into the in-app stage-two
# splash (SplashScreen), which carries the wordmark, tagline and loading dots.
# Pre-Android-12 honors light/dark; Android 12+ shows the mint-on-ink icon
# identity (the platform masks the launch image to an icon, so text lives in
# stage two). fullscreen matches the app's status-bar treatment during launch.
# Regenerate with `dart run flutter_native_splash:create`.
flutter_native_splash:
  android: true
  ios: false
  web: false
  fullscreen: true
  color: "#F4FAF6"
  image: "assets/branding/splash.png"
  color_dark: "#141D28"
  image_dark: "assets/branding/splash_dark.png"
  android_12:
    image: "assets/branding/icon_foreground.png"
    icon_background_color: "#1E2A38"
    image_dark: "assets/branding/icon_foreground.png"
    icon_background_color_dark: "#1E2A38"
