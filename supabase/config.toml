# Puff — Supabase project configuration (local dev via `supabase start`).
# The hosted project is linked with `supabase link`; migrations are applied
# with `supabase db push`.

project_id = "puff"

[auth]
# Every user starts as an anonymous session and is upgraded in place
# (email today; Apple/Google later) when they buy Pro or join a duel.
enable_anonymous_sign_ins = true

[auth.email]
enable_signup = true
# Local dev: skip inbox round-trips. Hosted: turn confirmations on.
enable_confirmations = false

# Edge functions are the app's entire backend API — the client never queries
# tables or RPCs directly. verify_jwt is the default; stated here for intent.
[functions.sync-events]
verify_jwt = true

[functions.entitlements]
verify_jwt = true

[functions.global-stats]
verify_jwt = true

[functions.report-stats]
verify_jwt = true

[functions.account]
verify_jwt = true
